<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>

<body>
    <h2>Student Registration Form</h2>
    <form>
        <label for="fname">FIRST NAME</label><br>
        <input type="text" id="fname" placeholder=" Enter first name" required><br><br>
        <label for="lname">LAST NAME</label><br>
        <input type="text" id="lname" placeholder=" Enter last name" required><br><br>
        <label for="rollnumber">ROLL NO</label><br>
        <input type="number" id="rollnumber" placeholder=" Enter roll number" required><br><br>
        <label for="dob">DOB</label><br>
        <input type="date" id="dob" placeholder=" Enter dob" required><br><br>
        <label for="age">AGE</label><br>
        <input type="number" id="age" placeholder="Enter age" required><br><br>
        <label for="hobbies">HOBBIES</label><br>
        <input type="checkbox" id="reading" name="hobbies" value="reading">
        <label for="reading">Reading</label><br>
        <input type="checkbox" id="music" name="hobbies" value="music">
        <label for="music">Music</label><br>
        <input type="checkbox" id="dance" name="hobbies" value="dance">
        <label for="dance">Dance</label><br>
        <input type="checkbox" id="sports" name="hobbies" value="sports">
        <label for="sports">Sports</label><br>
        <label for="email">EMAIL</label><br>
        <input type="email" id="email" placeholder="Enter your Emaail" required><br><br>
        <label for="password">PASSWORD</label><br>
        <input type="password" id="password" placeholder=" Enter your password" required><br><br>
        <label for="address">ADDRESS</label><br>
        <textarea id="address" name="address " placeholder=" Enter your address" rows="4" cols="10"
            required></textarea><br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>

</html>
